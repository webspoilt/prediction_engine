<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL Prediction Engine | Live Betting Analytics</title>
    <meta name="description" content="Professional IPL match prediction engine with real-time betting odds, prop bets, and ML-powered analytics.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #0f1629;
            --bg-card: rgba(15, 22, 41, 0.85);
            --bg-elevated: rgba(25, 35, 60, 0.7);
            --border: rgba(99, 115, 171, 0.15);
            --border-active: rgba(99, 115, 171, 0.35);
            --border-color: rgba(99, 115, 171, 0.2);
            --text-primary: #f0f4ff;
            --text-secondary: #8892b0;
            --text-muted: #5a6480;
            --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-amber: #f59e0b;
            --accent-purple: #8b5cf6;
            --accent-pink: #ec4899;
            --gradient-primary: linear-gradient(135deg, #3b82f6, #06b6d4);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .plotly-gauge-container {
            width: 100%;
            height: 250px;
            margin: 0 auto;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 20%, rgba(59,130,246,0.06) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(6,182,212,0.04) 0%, transparent 50%),
                        radial-gradient(circle at 50% 50%, rgba(139,92,246,0.03) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, 1%) rotate(1deg); }
            66% { transform: translate(-1%, 2%) rotate(-1deg); }
        }

        .app { position: relative; z-index: 1; max-width: 1440px; margin: 0 auto; padding: 16px; }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 24px;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding: 20px 28px; }
        .logo { display: flex; align-items: center; gap: 14px; }
        .logo-icon { width: 48px; height: 48px; background: var(--gradient-primary); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; }
        .status-badge { padding: 6px 14px; border-radius: 100px; font-size: 11px; font-weight: 700; text-transform: uppercase; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: var(--accent-green); }
        
        .tabs { display: flex; gap: 4px; margin-bottom: 24px; background: var(--bg-secondary); border-radius: var(--radius-lg); padding: 4px; }
        .tab-btn { padding: 10px 20px; border: none; background: transparent; color: var(--text-secondary); font-size: 13px; font-weight: 600; cursor: pointer; border-radius: var(--radius-md); }
        .tab-btn.active { background: var(--accent-blue); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .grid-main { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>

<div class="app">
    <header class="card header">
        <div class="logo">
            <div class="logo-icon"><i data-lucide="activity" style="color:white;width:24px;height:24px"></i></div>
            <div class="logo-text">
                <h1><span>IPL</span> Predictor</h1>
                <p>ML-Powered Betting Analytics</p>
            </div>
        </div>
        <div class="header-right">
            <select id="match-selector" class="match-select"><option value="">Scanning matches...</option></select>
            <div class="status-badge"><span class="dot"></span>Engine Active</div>
        </div>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('live')">🔴 Live Predictions</button>
    </div>

    <div id="tab-live" class="tab-content active">
        <div class="grid-main">
            <div class="card">
                <div style="display:flex; gap: 30px;">
                    <div style="flex:1; display:flex; flex-direction:column; justify-content:center;">
                        <div style="font-size: 14px; color: var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px;">
                            Live Prediction Model
                        </div>
                        <div style="margin-bottom: 20px;">
                            <h2 style="font-family: 'Outfit', sans-serif; font-size:42px; font-weight:700; background: linear-gradient(90deg, #fff, #a1a1aa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height:1.1;" id="prob-text">-</h2>
                            <div style="font-size: 16px; color: #a1a1aa; margin-top:5px; font-weight:500;">
                                Prediction Interval: <span id="prob-range" style="color:white; font-weight:600;">-</span>
                            </div>
                            <div id="confidence-badge" style="display:inline-block; padding: 4px 10px; background: rgba(59, 130, 246, 0.2); color: #60a5fa; border-radius: 20px; font-size: 12px; font-weight: 600; margin-top: 10px; border: 1px solid rgba(59, 130, 246, 0.3);">
                                Model Confidence: -
                            </div>
                        </div>
                        <div style="background: rgba(0,0,0,0.2); border-radius: 12px; padding: 15px; border: 1px solid var(--border-color); display:flex; align-items:center; gap: 15px;">
                            <i data-lucide="git-merge" style="color: #10b981; width:24px; height:24px;"></i>
                            <div>
                                <div style="font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase;">Ensemble Agreement</div>
                                <div id="agreement-metric" style="font-size: 18px; font-weight: 700; color: white;">-</div>
                            </div>
                        </div>
                    </div>
                    <div style="flex:1; display:flex; align-items:center; justify-content:center; padding:20px; background: rgba(0,0,0,0.2); border-radius: 16px; border: 1px solid var(--border-color); flex-direction:column;">
                        <div id="plotly-gauge" class="plotly-gauge-container"></div>
                        <div style="display:flex; justify-content:space-between; width:100%; max-width:280px; margin-top:-20px; position:relative; z-index:10;">
                            <div id="team1-gauge-label" style="font-weight:700; color:#fff; font-size:14px;">TEAM 1</div>
                            <div id="team2-gauge-label" style="font-weight:700; color:#fff; font-size:14px;">TEAM 2</div>
                        </div>
                    </div>
                </div>
                <div class="card" style="margin-top: 24px;">
                    <h3 style="display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--border-color); padding-bottom:16px; margin-bottom:16px;">
                        <i data-lucide="bar-chart-2" style="color: #f59e0b;"></i> Key Win Factors (SHAP)
                    </h3>
                    <div id="shap-factors" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
                        <div style="padding: 20px; text-align: center; color: var(--text-muted); grid-column: 1 / -1;">Awaiting live analysis...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();

    // ─── State ───
    let ws = null, activeMatchId = null, reconnectAttempts = 0;
    const MAX_RECONNECT = 10;

    // ─── Chart Setup ───
    const ctx = document.getElementById('probChart').getContext('2d');
    const gradient = ctx.createLinearGradient(0, 0, 0, 300);
    gradient.addColorStop(0, 'rgba(59,130,246,0.3)');
    gradient.addColorStop(1, 'rgba(59,130,246,0)');

    const probChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: 'Win %',
                data: [],
                borderColor: '#3b82f6',
                backgroundColor: gradient,
                borderWidth: 2.5,
                fill: true,
                tension: 0.4,
                pointRadius: 0,
                pointHoverRadius: 5,
                pointHoverBackgroundColor: '#3b82f6'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false } },
            scales: {
                x: { grid: { display: false }, ticks: { color: '#5a6480', font: { size: 10 } } },
                y: { min: 0, max: 100, grid: { color: 'rgba(99,115,171,0.08)' }, ticks: { color: '#5a6480', callback: v => v + '%', font: { size: 10 } } }
            },
            interaction: { mode: 'nearest', axis: 'x', intersect: false }
        }
    });

    // ─── Tab Switching ───
    function switchTab(tabName) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tabName).classList.add('active');
        event.currentTarget.classList.add('active');
        if (tabName === 'schedule') loadSchedule(2026);
    }

    // ─── Match Polling ───
    async function fetchMatches() {
        try {
            const res = await fetch('/matches');
            const matches = await res.json();
            const sel = document.getElementById('match-selector');
            if (matches.length > 0) {
                sel.innerHTML = matches.map(m => `<option value="${m.match_id}">${m.teams.join(' vs ')}</option>`).join('');
                if (!activeMatchId) connectMatch(matches[0].match_id);
            } else {
                sel.innerHTML = '<option value="">No Live Matches</option>';
                // Handle empty state gracefully
                document.getElementById('team1-name').textContent = "Waiting";
                document.getElementById('team2-name').textContent = "Match";
                document.getElementById('team1-logo').style.background = "#5a6480";
                document.getElementById('team1-logo').innerHTML = '<i data-lucide="clock" style="width:24px;height:24px;color:white"></i>';
                document.getElementById('team2-logo').style.background = "#5a6480";
                document.getElementById('team2-logo').innerHTML = '<i data-lucide="clock" style="width:24px;height:24px;color:white"></i>';
                document.getElementById('live-score').textContent = "Offline";
                document.getElementById('live-score').style.color = "var(--text-muted)";
                document.getElementById('live-overs').textContent = "Check Schedule for upcoming games";
                document.getElementById('prob-text').textContent = '-';
                document.getElementById('prob-range').textContent = '-';
                if (window.lucide) window.lucide.createIcons();
            }
        } catch(e) { console.error('Match fetch error', e); }
    }

    function connectMatch(id) {
        if (ws) ws.close();
        activeMatchId = id;
        reconnectAttempts = 0;
        openWebSocket(id);
    }

    function openWebSocket(id) {
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${proto}//${location.host}/ws/predictions/${id}`);

        ws.onmessage = (e) => {
            try {
                const data = JSON.parse(e.data);
                updateDashboard(data);
                reconnectAttempts = 0;
            } catch(err) { console.error('Parse error:', err); }
        };

        ws.onclose = () => {
            if (reconnectAttempts < MAX_RECONNECT) {
                const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000);
                reconnectAttempts++;
                console.log(`Reconnecting in ${delay}ms (attempt ${reconnectAttempts})`);
                setTimeout(() => openWebSocket(id), delay);
            }
        };
        ws.onerror = (err) => console.error('WS error:', err);
    }

    // ─── Dashboard Update ───
    function updateDashboard(data) {
        const p = (data.win_probability || 0.5) * 100;
        const prob = p.toFixed(1);
        const lossPct = (100 - p).toFixed(1);

        // Score & Overs
        if (data.score) document.getElementById('live-score').textContent = data.score;
        if (data.over !== undefined) document.getElementById('live-overs').textContent = data.over + ' Overs';

        // Teams
        const t1 = (data.teams && data.teams[0]) ? data.teams[0] : 'Team 1';
        const t2 = (data.teams && data.teams[1]) ? data.teams[1] : 'Team 2';
        if (data.teams && data.teams.length >= 2) {
            document.getElementById('team1-name').textContent = t1;
            document.getElementById('team2-name').textContent = t2;
            document.getElementById('team1-logo').textContent = t1.substring(0, 3).toUpperCase();
            document.getElementById('team2-logo').textContent = t2.substring(0, 3).toUpperCase();
        }

        // ── Prediction Range (interval) ──
        const intMin = data.interval_min !== undefined ? (data.interval_min * 100).toFixed(1) : (p - 5).toFixed(1);
        const intMax = data.interval_max !== undefined ? (data.interval_max * 100).toFixed(1) : (p + 5).toFixed(1);
        document.getElementById('prob-text').textContent = `${t1} ${prob}%`;
        const rangeEl = document.getElementById('prob-range');
        if (rangeEl) rangeEl.textContent = `${intMin}% – ${intMax}%`;

        // ── Confidence Badge ──
        const confPct = data.confidence_pct !== undefined ? data.confidence_pct.toFixed(1) : (data.confidence ? (data.confidence * 100).toFixed(1) : '--');
        const badge = document.getElementById('confidence-badge');
        if (badge) {
            if (data.status === 'LOW_CONFIDENCE') {
                badge.innerHTML = `⚠️ LOW CONFIDENCE (${confPct}%)`;
                badge.style.background = 'rgba(245,158,11,0.2)';
                badge.style.color = '#fbbf24';
                badge.style.borderColor = 'rgba(245,158,11,0.3)';
            } else {
                badge.textContent = `Model Confidence: ${confPct}%`;
                badge.style.background = 'rgba(16,185,129,0.2)';
                badge.style.color = '#34d399';
                badge.style.borderColor = 'rgba(16,185,129,0.3)';
            }
        }

        // ── Ensemble Agreement ──
        const agreeEl = document.getElementById('agreement-metric');
        if (agreeEl) {
            const agree = data.agreement_pct !== undefined ? data.agreement_pct.toFixed(1) : '--';
            agreeEl.textContent = agree !== '--' ? `${agree}%` : '--';
            agreeEl.style.color = parseFloat(agree) > 75 ? '#34d399' : '#fbbf24';
        }

        // ── Plotly Gauge ──
        renderPlotlyGauge(data.win_probability || 0.5, t1, t2);

        // ── SHAP Impact Factors ──
        if (data.impact_factors) renderShapFactors(data.impact_factors);

        // ── Scenario Milestone Panel ──
        const scenario = data.scenario;
        if (scenario) {
            const p180 = ((scenario.prob_180_plus || 0) * 100).toFixed(1);
            const p90Score = (scenario.p90_score || 0).toFixed(0);
            const medianScore = (scenario.projected_median_score || 0).toFixed(0);
            const agentEl = document.getElementById('agent-panel');
            if (agentEl) {
                agentEl.innerHTML = `
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                        <div style="background:var(--bg-elevated);padding:10px;border-radius:8px;text-align:center;">
                            <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;">Median Score</div>
                            <div style="font-size:22px;font-weight:800;color:white;">${medianScore}</div>
                        </div>
                        <div style="background:var(--bg-elevated);padding:10px;border-radius:8px;text-align:center;">
                            <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;">P90 Ceiling</div>
                            <div style="font-size:22px;font-weight:800;color:#60a5fa;">${p90Score}</div>
                        </div>
                        <div style="background:rgba(16,185,129,0.1);padding:10px;border-radius:8px;text-align:center;border:1px solid rgba(16,185,129,0.3);">
                            <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;">180+ Prob</div>
                            <div style="font-size:20px;font-weight:800;color:#34d399;">${p180}%</div>
                        </div>
                        <div style="background:rgba(239,68,68,0.1);padding:10px;border-radius:8px;text-align:center;border:1px solid rgba(239,68,68,0.3);">
                            <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;">Early Collapse</div>
                            <div style="font-size:20px;font-weight:800;color:#f87171;">${((scenario.prob_early_collapse || 0)*100).toFixed(1)}%</div>
                        </div>
                    </div>`;
            }
        }

        // Winner odds (live tab & odds tab)
        if (data.teams && data.teams.length >= 2) {
            const d1 = prob > 50 ? (100 / prob).toFixed(2) : (100 / prob).toFixed(2);
            const d2 = (100 / lossPct).toFixed(2);
            const oddsHtml = `
                <div class="odds-card"><div><div class="selection">${data.teams[0]}</div><div class="selection-sub">${prob}% implied</div></div><div class="odds-value favorite">${d1}</div></div>
                <div class="odds-card"><div><div class="selection">${data.teams[1]}</div><div class="selection-sub">${lossPct}% implied</div></div><div class="odds-value underdog">${d2}</div></div>
            `;
            document.getElementById('winner-odds').innerHTML = oddsHtml;
            document.getElementById('odds-match-winner').innerHTML = oddsHtml;
        }

        // Over/Under (build from current state)
        const crr = data.crr || 7.5;
        const projected = Math.round(crr * 20);
        const lines = [projected - 30, projected - 15, projected, projected + 15, projected + 30].filter(l => l > 100);
        let ouHtml = '';
        lines.forEach(line => {
            const overProb = Math.max(10, Math.min(90, 50 + (projected - line) * 2));
            const underProb = 100 - overProb;
            const overOdds = (100 / overProb).toFixed(2);
            const underOdds = (100 / underProb).toFixed(2);
            ouHtml += `<tr><td style="font-weight:700">${line}</td><td><span class="ou-cell">${overOdds}</span></td><td><span class="ou-cell">${underOdds}</span></td></tr>`;
        });
        document.getElementById('ou-body').innerHTML = ouHtml;

        // Agent panel
        if (data.agent_confidence !== undefined) {
            const agentConf = Math.round(data.agent_confidence * 100);
            const agentDisagree = (data.agent_disagreement || 0).toFixed(3);
            document.getElementById('agent-panel').innerHTML = `
                <div style="display:flex;justify-content:space-between;align-items:center;padding:10px;background:var(--bg-elevated);border-radius:8px">
                    <span style="font-size:12px;color:var(--text-secondary)">Swarm Confidence</span>
                    <span style="font-weight:700;font-size:18px;color:var(--accent-green)">${agentConf}%</span>
                </div>
                <div style="display:flex;justify-content:space-between;align-items:center;padding:10px;background:var(--bg-elevated);border-radius:8px">
                    <span style="font-size:12px;color:var(--text-secondary)">Disagreement σ</span>
                    <span style="font-weight:700;font-size:18px;color:var(--accent-amber)">${agentDisagree}</span>
                </div>
            `;
        }

        // Chart update
        const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        if (probChart.data.labels.length > 30) { probChart.data.labels.shift(); probChart.data.datasets[0].data.shift(); }
        probChart.data.labels.push(now);
        probChart.data.datasets[0].data.push(prob);
        probChart.update('none');
    }

    // ─── Schedule & Points ───
    async function loadSchedule(season) {
        try {
            const [upRes, ptRes] = await Promise.all([fetch(`/upcoming/${season}`), fetch(`/points/${season}`)]);
            if (upRes.ok) {
                const up = await upRes.json();
                if (up && up.matchschedule) {
                    let h = '<table class="points-table"><tr><th>Date</th><th>Match</th><th>Venue</th></tr>';
                    up.matchschedule.slice(0, 15).forEach(m => { h += `<tr><td>${m.matchdate || ''}</td><td style="font-weight:600">${m.teama || ''} vs ${m.teamb || ''}</td><td style="color:var(--text-muted)">${m.venue || ''}</td></tr>`; });
                    h += '</table>';
                    document.getElementById('schedule-container').innerHTML = h;
                } else { document.getElementById('schedule-container').textContent = 'No schedule data available.'; }
            }
            if (ptRes.ok) {
                const pt = await ptRes.json();
                if (pt && pt.points) {
                    let h = '<table class="points-table"><tr><th>Team</th><th>M</th><th>W</th><th>L</th><th>Pts</th><th>NRR</th></tr>';
                    pt.points.forEach(p => { h += `<tr><td style="font-weight:700">${p.teamshortname || p.name || ''}</td><td>${p.matchesplayed || ''}</td><td style="color:var(--accent-green)">${p.matcheswon || ''}</td><td style="color:var(--accent-red)">${p.matcheslost || ''}</td><td style="font-weight:800;color:var(--accent-blue)">${p.points || ''}</td><td>${p.nrr || ''}</td></tr>`; });
                    h += '</table>';
                    document.getElementById('points-container').innerHTML = h;
                } else { document.getElementById('points-container').textContent = 'No points table data.'; }
            }
        } catch(e) { console.error('Schedule error:', e); }
    }

    // ─── Player Analysis ───
    let searchTO;
    document.getElementById('player-search').addEventListener('keyup', function() {
        const q = this.value;
        const rd = document.getElementById('search-results');
        if (q.length < 3) { rd.style.display = 'none'; return; }
        clearTimeout(searchTO);
        searchTO = setTimeout(async () => {
            try {
                const res = await fetch(`/ipl/players?search=${encodeURIComponent(q)}`);
                const data = await res.json();
                if (data.players && data.players.length > 0) {
                    rd.innerHTML = data.players.slice(0, 10).map(p => `<div class="search-item" onclick="selectPlayer('${p.replace(/'/g,"\\'")}')">${p}</div>`).join('');
                    rd.style.display = 'block';
                } else { rd.style.display = 'none'; }
            } catch(e) { console.error(e); }
        }, 300);
    });

    async function selectPlayer(name) {
        document.getElementById('player-search').value = name;
        document.getElementById('search-results').style.display = 'none';
        try {
            const res = await fetch(`/ipl/player/${encodeURIComponent(name)}`);
            if (res.ok) {
                const d = await res.json();
                document.getElementById('ps-name').textContent = d.player;
                document.getElementById('ps-runs').textContent = d.batting.runs;
                document.getElementById('ps-sr').textContent = d.batting.strike_rate;
                document.getElementById('ps-4s').textContent = d.batting.fours;
                document.getElementById('ps-6s').textContent = d.batting.sixes;
                document.getElementById('ps-wkts').textContent = d.bowling.wickets;
                document.getElementById('ps-econ').textContent = d.bowling.economy;
                document.getElementById('ps-bmat').textContent = d.bowling.matches;
                document.getElementById('player-stats').style.display = 'block';
            }
        } catch(e) { console.error(e); }
    }

    document.addEventListener('click', e => { if (e.target.id !== 'player-search') document.getElementById('search-results').style.display = 'none'; });
    document.getElementById('match-selector').addEventListener('change', e => { if (e.target.value) connectMatch(e.target.value); });

    // ─── Init ───
    setInterval(fetchMatches, 10000);
    fetchMatches();
</script>
</body>
</html>
