<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITAN v4.7 — Sovereign Pro Analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-deep: #050810;
            --bg-card: rgba(15, 23, 42, 0.8);
            --accent-titan: #6366f1;
            --accent-emerald: #10b981;
            --accent-rose: #f43f5e;
            --accent-cyan: #22d3ee;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --radius: 16px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
        }
        .navbar {
            padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100;
        }
        .brand { display: flex; align-items: center; gap: 12px; font-weight: 900; font-size: 1.2rem; }
        .brand i { color: var(--accent-titan); }
        .match-badge { font-family: 'JetBrains Mono'; font-size: 11px; background: rgba(255,255,255,0.05); padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); color: var(--accent-cyan); }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .analytics-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 24px; }
        @media (max-width: 900px) { .analytics-grid { grid-template-columns: 1fr; } }

        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 30px; backdrop-filter: blur(20px); }
        .card-title { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-dim); margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
        .card-title i { color: var(--accent-titan); }

        .win-prob-hero { text-align: center; margin-bottom: 40px; }
        .prob-value { font-size: 5rem; font-weight: 900; line-height: 1; margin: 10px 0; color: #fff; text-shadow: 0 0 30px rgba(99, 102, 241, 0.3); }
        .prob-label { font-size: 1rem; color: var(--text-dim); font-weight: 600; letter-spacing: 1px; }

        .shap-container { display: flex; flex-direction: column; gap: 16px; }
        .shap-row { display: flex; align-items: center; gap: 15px; }
        .shap-label { width: 120px; font-size: 0.8rem; color: var(--text-dim); font-weight: 600; }
        .shap-track { flex: 1; height: 10px; background: rgba(255,255,255,0.05); border-radius: 5px; overflow: hidden; }
        .shap-fill { height: 100%; border-radius: 5px; transition: width 0.8s ease-out; }
        .fill-pos { background: linear-gradient(90deg, var(--accent-emerald), #34d399); }
        .fill-neg { background: linear-gradient(90deg, var(--accent-rose), #fb7185); }
        .shap-val { width: 50px; font-family: 'JetBrains Mono'; font-size: 11px; text-align: right; font-weight: 700; }

        .audit-log {
            background: rgba(0,0,0,0.3); border-radius: 12px; padding: 20px;
            font-family: 'JetBrains Mono', monospace; font-size: 11px; line-height: 1.6;
            color: var(--accent-emerald); height: 420px; overflow-y: auto;
            border: 1px solid var(--border);
        }
        .audit-entry { margin-bottom: 10px; border-left: 2px solid var(--accent-emerald); padding-left: 12px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .status-footer { display: flex; gap: 20px; margin-top: 20px; font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; }
        .status-active { color: var(--accent-emerald); display: flex; align-items: center; gap: 6px; }
        .pulse-dot { width: 6px; height: 6px; background: var(--accent-emerald); border-radius: 50%; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="brand"><i class="fas fa-bolt"></i> <span>TITAN v4.8 — PRO ANALYTICS</span></div>
        <div id="match-id-badge" class="match-badge">ID: —</div>
        <div class="nav-links" style="display:flex; gap:15px; align-items:center">
             <div style="font-size:12px; font-weight:800; color:var(--accent-rose); margin-right:15px">SOVEREIGN ORACLE ACTIVE</div>
             <a href="/" style="color:var(--text-main); text-decoration:none; font-size:12px; font-weight:700; border:1px solid var(--border); padding:6px 12px; border-radius:6px; background:rgba(255,255,255,0.05)">
                <i class="fas fa-arrow-left"></i> RETURN TO COMMAND
             </a>
        </div>
    </nav>

    <div class="container">
        <div class="analytics-grid">
            <div class="main-col">
                <div class="card" style="margin-bottom: 24px;">
                    <div class="card-title"><i class="fas fa-microchip"></i> Mathematical Necessity Verdict</div>
                    <div class="win-prob-hero">
                        <div id="prob-pct" class="prob-value">50%</div>
                        <div id="winner-label" class="prob-label">SYNCHRONIZING...</div>
                    </div>
                    
                    <div class="card-title" style="margin-top:40px"><i class="fas fa-dna"></i> Principal Momentum Drivers (SHAP)</div>
                    <div id="shap-list" class="shap-container">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>

            <div class="side-col">
                <div class="card" style="height: 100%;">
                    <div class="card-title"><i class="fas fa-terminal"></i> Sovereign Audit Log</div>
                    <div id="audit-log" class="audit-log">
                        [AUDITOR] Establishing secure uplink...
                    </div>
                    <div class="status-footer">
                        <div class="status-active"><span class="pulse-dot"></span> FEED: ACTIVE</div>
                        <div id="last-update">UTC: --:--:--</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const matchId = params.get('match_id');
        if (matchId) document.getElementById('match-id-badge').textContent = `ID: ${matchId}`;

        async function fetchState() {
            if (!matchId) return;
            try {
                const res = await fetch(`/predict/${matchId}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                render(data);
            } catch (e) {
                console.error('Fetch Error:', e);
                const log = document.getElementById('audit-log');
                log.innerHTML += `<div class="audit-entry" style="color:var(--accent-rose)">[CRITICAL] Connection lost: ${e.message}</div>`;
            }
        }

        function render(prediction) {
            const p = Math.round(prediction.win_probability * 100);
            document.getElementById('prob-pct').textContent = `${p}%`;
            document.getElementById('winner-label').textContent = `${prediction.batting_team || 'TEAM'} MOMENTUM`;
            
            const shapList = document.getElementById('shap-list');
            const factors = prediction.shap_factors || [
                {factor: "Run Rate", impact: 0.15},
                {factor: "Wickets", impact: 0.22},
                {factor: "Venue", impact: -0.05}
            ];
            
            shapList.innerHTML = factors.map(f => {
                const isPos = f.impact > 0;
                const pct = Math.min(Math.abs(f.impact) * 200, 100);
                return `
                    <div class="shap-row">
                        <div class="shap-label">${f.factor}</div>
                        <div class="shap-track">
                            <div class="shap-fill ${isPos ? 'fill-pos' : 'fill-neg'}" style="width: ${pct}%"></div>
                        </div>
                        <div class="shap-val">${isPos ? '+' : ''}${Math.round(f.impact * 100)}%</div>
                    </div>
                `;
            }).join('');

            const log = document.getElementById('audit-log');
            if (prediction.forensic_trace && prediction.forensic_trace.length > 0) {
                log.innerHTML = prediction.forensic_trace.map(t => 
                    `<div class="audit-entry">[AUDITOR] ${t}</div>`
                ).join('');
                log.scrollTop = log.scrollHeight;
            }
            
            document.getElementById('last-update').textContent = `UTC: ${new Date().toISOString().split('T')[1].split('.')[0]}`;
        }

        if (matchId) {
            fetchState();
            setInterval(fetchState, 10000);
        } else {
            document.getElementById('audit-log').innerHTML = `<div class="audit-entry" style="color:var(--accent-rose)">[CRITICAL] No Match ID specified. Please return to Hub.</div>`;
        }
    </script>
</body>
</html>
