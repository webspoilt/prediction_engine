<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2026 — Prediction Engine</title>
    <meta name="description" content="Real-time IPL 2026 match predictions with multi-source data pipeline and AI-powered win probability. Never empty, always live.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════════════════════════════════
           CSS Design System — Dark Glassmorphism
           ═══════════════════════════════════════════════════════════════════ */

        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: rgba(17, 24, 39, 0.7);
            --bg-glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(99, 102, 241, 0.3);

            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;

            --accent-indigo: #6366f1;
            --accent-violet: #8b5cf6;
            --accent-cyan: #22d3ee;
            --accent-emerald: #10b981;
            --accent-amber: #f59e0b;
            --accent-rose: #f43f5e;

            --gradient-primary: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
            --gradient-card: linear-gradient(135deg, rgba(99,102,241,0.08) 0%, rgba(139,92,246,0.04) 100%);
            --gradient-live: linear-gradient(135deg, #10b981 0%, #059669 100%);
            --gradient-bg: radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.08) 0%, transparent 50%),
                           radial-gradient(ellipse at 80% 20%, rgba(139,92,246,0.06) 0%, transparent 50%),
                           radial-gradient(ellipse at 50% 80%, rgba(34,211,238,0.04) 0%, transparent 50%);

            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.3);
            --shadow-glow: 0 0 20px rgba(99, 102, 241, 0.15);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;

            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--gradient-bg);
            z-index: -1;
            pointer-events: none;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--accent-indigo); border-radius: 3px; }

        /* ── Status Bar ── */
        #status-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px; height: 40px;
            background: rgba(10, 14, 26, 0.92);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-glass);
            font-size: 12px; color: var(--text-secondary);
            font-family: var(--font-mono);
        }
        .status-item { display: flex; align-items: center; gap: 6px; }
        .status-dot {
            width: 7px; height: 7px; border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }
        .status-dot.green { background: var(--accent-emerald); box-shadow: 0 0 6px var(--accent-emerald); }
        .status-dot.amber { background: var(--accent-amber); box-shadow: 0 0 6px var(--accent-amber); }
        .status-dot.red { background: var(--accent-rose); box-shadow: 0 0 6px var(--accent-rose); }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .status-offline-badge {
            background: rgba(244, 63, 94, 0.15);
            color: var(--accent-rose);
            padding: 2px 10px; border-radius: 10px;
            font-weight: 600; font-size: 11px;
            border: 1px solid rgba(244, 63, 94, 0.3);
        }

        /* ── Layout ── */
        .app-container {
            max-width: 1400px; margin: 0 auto;
            padding: 56px 24px 40px;
        }

        /* ── Header ── */
        .header {
            text-align: center; padding: 32px 0 24px;
        }
        .header h1 {
            font-size: 2.4rem; font-weight: 900;
            background: var(--gradient-primary);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em; line-height: 1.1;
        }
        .header p {
            color: var(--text-secondary); font-size: 0.95rem;
            margin-top: 8px; font-weight: 400;
        }
        .header .version-badge {
            display: inline-block; margin-top: 10px;
            padding: 3px 12px; border-radius: 20px;
            background: var(--gradient-card);
            border: 1px solid var(--border-glass);
            font-size: 11px; color: var(--accent-cyan);
            font-family: var(--font-mono); font-weight: 500;
        }

        /* ── Tab Navigation ── */
        .tab-nav {
            display: flex; gap: 4px; margin: 0 0 24px;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-md);
            padding: 4px;
            width: fit-content;
        }
        .tab-btn {
            background: transparent; border: none; color: var(--text-secondary);
            padding: 8px 20px; border-radius: var(--radius-sm);
            font-family: var(--font-main); font-size: 13px; font-weight: 500;
            cursor: pointer; transition: all 0.25s ease;
        }
        .tab-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.04); }
        .tab-btn.active {
            background: var(--accent-indigo); color: white;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.35);
        }

        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* ── Grid ── */
        .match-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 16px;
        }

        /* ── Match Card ── */
        .match-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden;
        }
        .match-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0;
            height: 2px;
            background: var(--gradient-primary);
            opacity: 0; transition: opacity 0.3s;
        }
        .match-card:hover {
            border-color: var(--border-glow);
            box-shadow: var(--shadow-glow);
            transform: translateY(-2px);
            cursor: pointer;
        }
        .match-card:hover::before { opacity: 1; }

        .match-card.live-card {
            border-color: rgba(16, 185, 129, 0.3);
        }
        .match-card.live-card::before {
            background: var(--gradient-live); opacity: 1;
            height: 3px;
        }

        .card-header {
            display: flex; justify-content: space-between;
            align-items: flex-start; margin-bottom: 16px;
        }
        .match-meta {
            display: flex; flex-direction: column; gap: 4px;
        }
        .match-label {
            font-size: 11px; font-weight: 600; text-transform: uppercase;
            color: var(--text-muted); letter-spacing: 0.08em;
        }
        .match-venue {
            font-size: 12px; color: var(--text-secondary);
        }
        .match-date {
            font-size: 11px; color: var(--text-muted);
            font-family: var(--font-mono);
        }

        .live-badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 3px 10px; border-radius: 20px;
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .live-badge.status-live {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-emerald);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .live-badge.status-live .badge-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--accent-emerald);
            animation: pulse-dot 1.5s infinite;
        }
        .live-badge.status-scheduled {
            background: rgba(99, 102, 241, 0.12);
            color: var(--accent-indigo);
            border: 1px solid rgba(99, 102, 241, 0.25);
        }
        .live-badge.status-completed {
            background: rgba(100, 116, 139, 0.12);
            color: var(--text-muted);
            border: 1px solid rgba(100, 116, 139, 0.2);
        }

        .teams-row {
            display: flex; align-items: center; justify-content: space-between;
            gap: 12px; margin-bottom: 14px;
        }
        .team-block {
            display: flex; flex-direction: column; align-items: center;
            gap: 6px; flex: 1; min-width: 0;
        }
        .team-logo {
            width: 52px; height: 52px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 800; color: white;
            border: 2px solid rgba(255,255,255,0.1);
            transition: transform 0.3s;
        }
        .match-card:hover .team-logo { transform: scale(1.08); }
        .team-name {
            font-size: 13px; font-weight: 600; text-align: center;
            color: var(--text-primary);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            max-width: 140px;
        }
        .versus {
            color: var(--text-muted); font-size: 12px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.15em;
            flex-shrink: 0;
        }

        .score-row {
            text-align: center; padding: 10px 0;
            border-top: 1px solid var(--border-glass);
        }
        .score-text {
            font-family: var(--font-mono); font-size: 1.4rem;
            font-weight: 700; color: var(--accent-cyan);
        }
        .over-text {
            font-size: 12px; color: var(--text-muted);
            font-family: var(--font-mono); margin-top: 2px;
        }

        /* ── Probability Bar ── */
        .prob-bar-wrapper {
            margin-top: 12px;
        }
        .prob-labels {
            display: flex; justify-content: space-between;
            font-size: 11px; font-weight: 600; margin-bottom: 5px;
        }
        .prob-track {
            height: 6px; border-radius: 3px;
            background: rgba(255, 255, 255, 0.06);
            overflow: hidden; position: relative;
        }
        .prob-fill {
            height: 100%; border-radius: 3px;
            background: var(--gradient-primary);
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ── Points Table ── */
        .points-table-wrap {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        .points-table {
            width: 100%; border-collapse: collapse;
        }
        .points-table th {
            background: rgba(99, 102, 241, 0.08);
            padding: 12px 16px; text-align: left;
            font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.08em;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-glass);
        }
        .points-table td {
            padding: 12px 16px; font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            color: var(--text-primary);
        }
        .points-table tr:hover td {
            background: rgba(99, 102, 241, 0.04);
        }
        .points-table .team-cell {
            display: flex; align-items: center; gap: 10px;
            font-weight: 600;
        }
        .points-table .team-dot {
            width: 8px; height: 8px; border-radius: 50%;
        }
        .points-table td.nrr-positive { color: var(--accent-emerald); }
        .points-table td.nrr-negative { color: var(--accent-rose); }

        /* ── Shimmer Skeleton ── */
        .skeleton-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 20px; min-height: 220px;
        }
        .shimmer {
            background: linear-gradient(90deg,
                rgba(255,255,255,0.03) 0%,
                rgba(255,255,255,0.08) 50%,
                rgba(255,255,255,0.03) 100%);
            background-size: 200% 100%;
            animation: shimmer 1.8s ease-in-out infinite;
            border-radius: var(--radius-sm);
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .shimmer-line {
            height: 14px; margin-bottom: 12px; border-radius: 4px;
        }
        .shimmer-line.w60 { width: 60%; }
        .shimmer-line.w80 { width: 80%; }
        .shimmer-line.w40 { width: 40%; }
        .shimmer-circle {
            width: 52px; height: 52px; border-radius: 50%;
            margin: 0 auto 8px;
        }

        /* ── Source Health Panel ── */
        .health-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 20px;
            backdrop-filter: blur(10px);
            margin-bottom: 24px;
        }
        .health-panel h3 {
            font-size: 14px; font-weight: 700;
            color: var(--text-primary); margin-bottom: 14px;
            display: flex; align-items: center; gap: 8px;
        }
        .health-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }
        .health-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-sm);
            font-size: 12px;
        }
        .health-item .h-dot {
            width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
        }
        .health-item .h-name { font-weight: 600; color: var(--text-primary); }
        .health-item .h-rate {
            margin-left: auto; font-family: var(--font-mono);
            font-size: 11px; color: var(--text-muted);
        }

        /* ── Empty State ── */
        .empty-state {
            text-align: center; padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state h3 { font-size: 18px; color: var(--text-secondary); margin-bottom: 8px; }
        .empty-state p { font-size: 14px; }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .app-container { padding: 52px 12px 24px; }
            .header h1 { font-size: 1.6rem; }
            .match-grid { grid-template-columns: 1fr; }
            #status-bar { padding: 0 12px; font-size: 10px; }
            .health-grid { grid-template-columns: 1fr 1fr; }
            .tab-nav { width: 100%; }
            .tab-btn { flex: 1; text-align: center; padding: 8px 12px; font-size: 12px; }
        }

        /* ── Utility ── */
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.4s ease; }
        /* ── Titan Pulse Button ── */
        .btn-titan {
            display: inline-flex; align-items: center; gap: 8px;
            width: 100%; justify-content: center;
            margin-top: 15px; padding: 10px;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-md);
            color: var(--accent-cyan);
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            text-decoration: none; transition: all 0.2s;
            font-family: var(--font-mono);
        }
        .btn-titan:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--accent-indigo);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
        }
        .pulse-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--accent-rose);
            box-shadow: 0 0 10px var(--accent-rose);
            animation: titan-pulse 1.5s infinite;
        }
        @keyframes titan-pulse {
            0% { transform: scale(0.9); opacity: 1; }
            70% { transform: scale(2); opacity: 0; }
            100% { transform: scale(0.9); opacity: 0; }
        }

        /* ── v4.8 New UI Buttons ── */
        .pro-link-btn {
            background: linear-gradient(135deg, var(--accent-indigo) 0%, var(--accent-cyan) 100%);
            color: #fff; font-weight: 800; font-size: 11px;
            padding: 8px 16px; border-radius: var(--radius-sm);
            text-decoration: none; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
            transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        .pro-link-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(99, 102, 241, 0.6);
        }
        .cta-primary-glow {
            background: var(--gradient-primary);
            color: #fff; border: none; padding: 12px 24px;
            border-radius: var(--radius-md); font-weight: 800;
            font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
            transition: all 0.3s; text-transform: uppercase;
        }
        .cta-primary-glow:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.5);
        }
        .cta-secondary {
            background: rgba(255,255,255,0.05);
            color: var(--text-secondary); border: 1px solid var(--border-glass);
            padding: 12px 24px; border-radius: var(--radius-md);
            font-weight: 600; font-size: 13px; cursor: pointer;
            transition: all 0.2s;
        }
        .cta-secondary:hover { background: rgba(255,255,255,0.1); }

        /* ── Live Oracle Hero Section ── */
        .live-oracle-hero {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.95) 0%, rgba(15, 23, 42, 0.98) 100%);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 30px; margin-bottom: 30px;
            position: relative; overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            display: none; /* Shown only when a match is live */
        }
        .hero-glow {
            position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }
        .hero-layout {
            display: grid; grid-template-columns: 1fr 1.5fr; gap: 40px;
            position: relative; z-index: 1;
        }
        .oracle-verdict {
            text-align: center; border-right: 1px solid var(--border-glass);
            padding-right: 40px;
        }
        .oracle-gauge {
            width: 140px; height: 140px; margin: 0 auto 20px;
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        .oracle-pct {
            font-size: 32px; font-weight: 800; color: var(--text-primary);
            font-family: var(--font-mono);
        }
        .oracle-label {
            font-size: 14px; font-weight: 600; color: var(--accent-cyan);
            text-transform: uppercase; letter-spacing: 2px;
        }
        .forensic-trace-hero {
            background: rgba(0,0,0,0.3);
            border-radius: var(--radius-md);
            padding: 15px; height: 180px; overflow-y: auto;
            font-family: var(--font-mono); font-size: 11px;
            color: var(--accent-emerald); line-height: 1.6;
        }
        .hero-match-meta {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; border-bottom: 1px solid var(--border-glass);
            padding-bottom: 10px;
        }
        .hero-teams { font-size: 20px; font-weight: 700; }
        
        @media (max-width: 768px) {
            .hero-layout { grid-template-columns: 1fr; gap: 20px; }
            .oracle-verdict { border-right: none; border-bottom: 1px solid var(--border-glass); padding: 0 0 20px 0; }
        }
    </style>
</head>
<body>

    <!-- ═══ Header ═══ -->
    <div class="header">
        <div class="logo">
            <i class="fas fa-bolt"></i>
        </div>
        <div class="brand">
            <h1>IPL Predictor</h1>
            <p>ML-Powered Betting Analytics</p>
        </div>
        <div class="nav-actions" style="margin-left: auto; display: flex; gap: 15px;">
            <a href="/static/walkthrough.html" class="pro-link-btn" style="background: linear-gradient(135deg, var(--accent-emerald) 0%, var(--accent-cyan) 100%);"><i class="fas fa-file-alt"></i> MATCH PREVIEW</a>
            <a href="/pro?match_id=ipl2026_14" class="pro-link-btn"><i class="fas fa-microscope"></i> PRO LAB</a>
            <div class="engine-status" id="engine-status-badge">
                <span class="status-dot green"></span>
                <span>TITAN ACTIVE</span>
            </div>
        </div>
        <span class="version-badge" style="margin-left:15px">v4.8 — Sovereign DNA</span>
    </div>

    <!-- ═══ Tab Navigation ═══ -->
    <div class="tab-nav">
        <button class="tab-btn active" data-tab="live"><i class="fas fa-satellite"></i> Live Hub</button>
        <button class="tab-btn" data-tab="schedule"><i class="fas fa-calendar-alt"></i> Full Schedule</button>
        <button class="tab-btn" data-tab="points"><i class="fas fa-list-ol"></i> Points Table</button>
        <button class="tab-btn" data-tab="health"><i class="fas fa-shield-halved"></i> Sovereign Health</button>
    </div>

    <div class="app-container">

        <!-- ═══ Tab: Live Matches ═══ -->
        <div class="tab-content active" id="tab-live">
            <!-- Live Oracle Hero Section (v4.5) -->
            <div id="live-oracle-hero" class="live-oracle-hero fade-in">
                <div class="hero-glow"></div>
                <div class="hero-match-meta">
                    <div id="hero-match-teams" class="hero-teams">Fetching live matchup...</div>
                    <div class="live-badge"><span class="badge-dot"></span>LIVE AUDIT</div>
                </div>
                <div class="hero-layout">
                    <div class="oracle-verdict">
                        <div class="oracle-gauge">
                            <div id="hero-win-pct" class="oracle-pct">0%</div>
                        </div>
                        <div class="oracle-label" id="hero-win-team">Evaluating...</div>
                    </div>
                    <div class="forensic-trace-hero" id="hero-audit-log">
                        [AUDITOR] Awaiting live data packet...
                    </div>
                </div>
                <!-- v4.8 CTAs -->
                <div class="hero-actions" style="margin-top:25px; display:flex; gap:15px; border-top:1px solid var(--border-glass); padding-top:20px">
                    <button class="cta-primary-glow" onclick="const mid = currentMatches.find(m=>m.status==='live')?.match_id || currentMatches.find(m=>m.status==='scheduled')?.match_id || 'ipl2026_14'; window.location='/pro?match_id='+mid">
                        <i class="fas fa-brain"></i> ACCESS SOVEREIGN ANALYTICS
                    </button>
                    <button class="cta-secondary" onclick="document.querySelector('[data-tab=schedule]').click()">
                        <i class="fas fa-list"></i> VIEW FULL SCHEDULE
                    </button>
                </div>
            </div>

            <div class="match-grid" id="live-grid">
                <!-- Skeleton loaders -->
                <div class="skeleton-card">
                    <div class="shimmer shimmer-line w60"></div>
                    <div style="display:flex;gap:20px;justify-content:center;margin:20px 0">
                        <div class="shimmer shimmer-circle"></div>
                        <div class="shimmer shimmer-circle"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ═══ Tab: Full Schedule ═══ -->
        <div class="tab-content" id="tab-schedule">
            <div class="match-grid" id="schedule-grid">
                <div class="empty-state"><h3>Loading 2026 Timetable...</h3></div>
            </div>
        </div>

        <!-- ═══ Tab: Points Table ═══ -->
        <div class="tab-content" id="tab-points">
            <div class="points-table-wrap">
                <table class="points-table">
                    <thead>
                        <tr><th>#</th><th>Team</th><th>P</th><th>W</th><th>L</th><th>NR</th><th>Pts</th><th>NRR</th></tr>
                    </thead>
                    <tbody id="points-body"></tbody>
                </table>
            </div>
        </div>

        <!-- ═══ Tab: Sovereign Health ═══ -->
        <div class="tab-content" id="tab-health">
            <div class="health-panel">
            <div class="health-panel">
                <h3>📊 System Components</h3>
                <div class="health-grid" id="system-grid">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>

    </div>

    <script>
    /* ═══════════════════════════════════════════════════════════════════════════
       IPL 2026 Prediction Engine — Frontend Controller (v5.0 Betting Edition)
       Auto-detects today's match. Shows 1xBet/4rabet decimal odds on every card.
       ═══════════════════════════════════════════════════════════════════════ */

    const TEAM_COLORS = {
        'CSK': '#ffd700', 'MI': '#004ba0', 'RCB': '#d4213d', 'KKR': '#3a225d',
        'SRH': '#ff822a', 'RR': '#ea1a85', 'DC': '#004c93', 'PBKS': '#ed1b24',
        'GT': '#1c3c6e', 'LSG': '#004f91'
    };

    const TEAM_SHORT = {
        'Chennai Super Kings': 'CSK', 'Mumbai Indians': 'MI',
        'Royal Challengers Bengaluru': 'RCB', 'Royal Challengers Bangalore': 'RCB',
        'Kolkata Knight Riders': 'KKR', 'Sunrisers Hyderabad': 'SRH',
        'Rajasthan Royals': 'RR', 'Delhi Capitals': 'DC',
        'Punjab Kings': 'PBKS', 'Kings XI Punjab': 'PBKS',
        'Gujarat Titans': 'GT', 'Lucknow Super Giants': 'LSG'
    };

    // OFFICIAL IPL TEAMS — strict validation to block PSL/CPL/BBL
    const OFFICIAL_IPL_TEAMS = new Set([
        'chennai super kings', 'mumbai indians',
        'royal challengers bengaluru', 'royal challengers bangalore',
        'kolkata knight riders', 'sunrisers hyderabad',
        'rajasthan royals', 'delhi capitals',
        'punjab kings', 'kings xi punjab',
        'gujarat titans', 'lucknow super giants',
        'csk', 'mi', 'rcb', 'kkr', 'srh', 'rr', 'dc', 'pbks', 'gt', 'lsg'
    ]);

    function isOfficialIPL(teamName) {
        if (!teamName) return false;
        return OFFICIAL_IPL_TEAMS.has(teamName.trim().toLowerCase());
    }

    // Updated offline schedule — today's match (Apr 8 = Match 14: DC vs GT)
    const OFFLINE_SCHEDULE = [
        {match_id:'ipl2026_14',teams:['Delhi Capitals','Gujarat Titans'],team_short:['DC','GT'],venue:'Delhi',status:'live',win_probability:0.5,score:'—',date:'Apr 08, 2026'},
        {match_id:'ipl2026_15',teams:['Kolkata Knight Riders','Lucknow Super Giants'],team_short:['KKR','LSG'],venue:'Kolkata',status:'scheduled',win_probability:0.5,score:'—',date:'Apr 09, 2026'},
    ];

    let currentMatches = [];
    let isOffline = false;
    const API_BASE = window.location.origin;

    async function apiFetch(endpoint) {
        try {
            const resp = await fetch(`${API_BASE}${endpoint}`, { signal: AbortSignal.timeout(10000) });
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            return await resp.json();
        } catch (e) {
            console.error(e);
            throw e;
        }
    }

    function getShort(name) { return TEAM_SHORT[name] || name.substring(0, 3).toUpperCase(); }
    function getColor(short) { return TEAM_COLORS[short] || '#6366f1'; }

    function renderMatchCard(match) {
        const teams = match.teams || ['TBD', 'TBD'];
        // CLIENT-SIDE IPL FILTER — final safety net
        if (!isOfficialIPL(teams[0]) || !isOfficialIPL(teams[1])) return '';

        const t1 = teams[0]; const t2 = teams[1];
        const s1 = (match.team_short && match.team_short[0]) || getShort(t1);
        const s2 = (match.team_short && match.team_short[1]) || getShort(t2);
        const c1 = getColor(s1); const c2 = getColor(s2);
        const status = match.status || 'scheduled';
        const prob = match.win_probability || 0.5;
        const probPct = Math.round(prob * 100);
        const probPct2 = 100 - probPct;
        
        let statusBadge = `<span class="live-badge status-${status}">${status.toUpperCase()}</span>`;
        if (status === 'live') statusBadge = `<span class="live-badge status-live"><span class="badge-dot"></span>LIVE</span>`;

        // 1xBet / 4rabet Style Betting Odds
        const odds = match.betting_odds || {};
        const t1Decimal = odds.team1_decimal || (1 / Math.max(0.05, prob)).toFixed(2);
        const t2Decimal = odds.team2_decimal || (1 / Math.max(0.05, 1 - prob)).toFixed(2);
        const t1Value = odds.team1_value || 'Fair';
        const t2Value = odds.team2_value || 'Fair';
        const t1American = odds.team1_american || '';
        const t2American = odds.team2_american || '';

        const valueBadge = (val) => {
            if (val === 'Strong Value') return '<span style="color:#10b981;font-size:9px;font-weight:800;margin-left:4px">★ VALUE</span>';
            if (val === 'Overpriced') return '<span style="color:#f43f5e;font-size:9px;font-weight:800;margin-left:4px">⚠ OVER</span>';
            return '';
        };

        return `
            <div class="match-card ${status === 'live' ? 'live-card' : ''}" onclick="window.location='/pro?match_id=${match.match_id}'">
                <div class="card-header">
                    <span class="match-label">${match.match_id.split('_')[1] ? 'Match ' + match.match_id.split('_')[1] : 'IPL 2026'} • ${match.venue || 'TBD'}</span>
                    ${statusBadge}
                </div>
                <div class="teams-row">
                    <div class="team-block">
                        <div class="team-logo" style="background:${c1}">${s1}</div>
                        <div class="team-name">${t1}</div>
                    </div>
                    <span class="versus">VS</span>
                    <div class="team-block">
                        <div class="team-logo" style="background:${c2}">${s2}</div>
                        <div class="team-name">${t2}</div>
                    </div>
                </div>
                <div class="score-row">${match.score || '—'}</div>

                <!-- 1xBet / 4rabet Style Decimal Odds Bar -->
                <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-top:1px solid rgba(255,255,255,0.06);margin-top:8px">
                    <div style="text-align:center;flex:1">
                        <div style="font-family:'JetBrains Mono',monospace;font-size:1.3rem;font-weight:800;color:${c1}">${parseFloat(t1Decimal).toFixed(2)}</div>
                        <div style="font-size:10px;color:#64748b;font-weight:600">${s1} WIN${valueBadge(t1Value)}</div>
                        <div style="font-size:9px;color:#475569;font-family:'JetBrains Mono'">${t1American}</div>
                    </div>
                    <div style="width:1px;height:35px;background:rgba(255,255,255,0.08)"></div>
                    <div style="text-align:center;flex:1">
                        <div style="font-family:'JetBrains Mono',monospace;font-size:1.3rem;font-weight:800;color:${c2}">${parseFloat(t2Decimal).toFixed(2)}</div>
                        <div style="font-size:10px;color:#64748b;font-weight:600">${s2} WIN${valueBadge(t2Value)}</div>
                        <div style="font-size:9px;color:#475569;font-family:'JetBrains Mono'">${t2American}</div>
                    </div>
                </div>

                <div class="prob-bar-wrapper">
                    <div class="prob-labels">
                        <span style="color:${c1}">${s1} ${probPct}%</span>
                        <span style="color:${c2}">${s2} ${probPct2}%</span>
                    </div>
                    <div class="prob-track"><div class="prob-fill" style="width:${probPct}%;background:linear-gradient(90deg,${c1},${c2})"></div></div>
                </div>
            </div>`;
    }

    function getTodaysMatch(matches) {
        // Auto-detect today's match from schedule using IST date
        const now = new Date();
        const istOffset = 5.5 * 60 * 60 * 1000;
        const istNow = new Date(now.getTime() + istOffset + now.getTimezoneOffset() * 60000);
        const todayStr = istNow.toLocaleDateString('en-US', {month: 'short', day: '2-digit', year: 'numeric'}).replace(',', ',');

        // Find live match first
        const live = matches.find(m => m.status === 'live');
        if (live) return live;

        // Find today's scheduled match
        const todayMatch = matches.find(m => {
            const d = m.date || '';
            const matchDate = new Date(d + ' 2026');
            return matchDate.toDateString() === istNow.toDateString() && m.status !== 'completed';
        });
        if (todayMatch) return todayMatch;

        // Fall back to the next upcoming match
        const upcoming = matches.filter(m => m.status === 'scheduled').sort((a, b) => (a.start_epoch || 0) - (b.start_epoch || 0));
        return upcoming[0] || matches[0];
    }

    function renderMatches(matches) {
        // Filter to only IPL matches on the client side too
        matches = matches.filter(m => {
            const teams = m.teams || [];
            return teams.length === 2 && isOfficialIPL(teams[0]) && isOfficialIPL(teams[1]);
        });

        const featured = getTodaysMatch(matches);
        
        if (featured) {
            document.getElementById('live-oracle-hero').style.display = 'block';
            document.getElementById('hero-match-teams').textContent = featured.teams.join(' vs ');
            const p = Math.round(featured.win_probability * 100);
            const winner = featured.win_probability > 0.5 ? featured.teams[0] : featured.teams[1];
            const winnerPct = featured.win_probability > 0.5 ? p : 100 - p;
            
            document.getElementById('hero-win-pct').textContent = winnerPct + '%';
            document.getElementById('hero-win-team').textContent = winner.split(' ').pop().toUpperCase() + ' DNA VERDICT';
            
            // Hero betting odds
            const odds = featured.betting_odds || {};
            const d1 = parseFloat(odds.team1_decimal || (1/Math.max(0.05, featured.win_probability))).toFixed(2);
            const d2 = parseFloat(odds.team2_decimal || (1/Math.max(0.05, 1 - featured.win_probability))).toFixed(2);
            const s1 = (featured.team_short && featured.team_short[0]) || getShort(featured.teams[0]);
            const s2 = (featured.team_short && featured.team_short[1]) || getShort(featured.teams[1]);

            const auditLog = document.getElementById('hero-audit-log');
            if (featured.forensic_trace && featured.forensic_trace.length > 0) {
                auditLog.innerHTML = featured.forensic_trace.map(t => `<div>[AUDITOR] ${t}</div>`).join('');
            } else {
                auditLog.innerHTML = `<div>[AUDITOR] DNA Analyzed: ${s1} vs ${s2} matchup loaded.</div>
                    <div style="margin-top:12px;padding:12px;background:rgba(16,185,129,0.08);border-radius:8px;border:1px solid rgba(16,185,129,0.2)">
                        <div style="font-size:10px;color:#64748b;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">1xBet / 4rabet DECIMAL ODDS</div>
                        <div style="display:flex;gap:20px">
                            <div><span style="color:${getColor(s1)};font-size:18px;font-weight:900">${d1}</span> <span style="font-size:10px">${s1}</span></div>
                            <div><span style="color:${getColor(s2)};font-size:18px;font-weight:900">${d2}</span> <span style="font-size:10px">${s2}</span></div>
                        </div>
                    </div>`;
            }
        }

        const liveAndScheduled = matches.filter(m => m.status === 'live' || m.status === 'scheduled').slice(0, 8);
        document.getElementById('live-grid').innerHTML = liveAndScheduled.map(renderMatchCard).join('') || '<div class="empty-state"><h3>No upcoming IPL matches found</h3></div>';
        document.getElementById('schedule-grid').innerHTML = matches.map(renderMatchCard).join('');
        currentMatches = matches;
    }

    async function fetchAllData() {
        try {
            const matches = await apiFetch('/matches');
            if (matches && matches.length > 0) renderMatches(matches);
            const health = await apiFetch('/api/data-health');
            if (health) {
                 document.getElementById('status-text').textContent = health.ml_engine_loaded ? 'Connected' : 'Syncing Engine...';
                 document.getElementById('status-dot').className = health.ml_engine_loaded ? 'status-dot green' : 'status-dot amber';
            }
        } catch (e) { console.error('Data sync failed', e); }
    }

    setInterval(fetchAllData, 15000);
    document.addEventListener('DOMContentLoaded', fetchAllData);

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn, .tab-content').forEach(el => el.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
        });
    });
    </script>
</body>
</html>
