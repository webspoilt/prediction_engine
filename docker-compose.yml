version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: ipl-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ipl-api
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    volumes:
      - ./models:/app/models
      - ./dataset/enhanced:/app/dataset/enhanced
    restart: always

volumes:
  redis_data:
