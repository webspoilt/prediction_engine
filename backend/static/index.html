<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2026 — Prediction Engine</title>
    <meta name="description" content="Real-time IPL 2026 match predictions with multi-source data pipeline and AI-powered win probability. Never empty, always live.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════════════════════════════════
           CSS Design System — Dark Glassmorphism
           ═══════════════════════════════════════════════════════════════════ */

        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: rgba(17, 24, 39, 0.7);
            --bg-glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(99, 102, 241, 0.3);

            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;

            --accent-indigo: #6366f1;
            --accent-violet: #8b5cf6;
            --accent-cyan: #22d3ee;
            --accent-emerald: #10b981;
            --accent-amber: #f59e0b;
            --accent-rose: #f43f5e;

            --gradient-primary: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
            --gradient-card: linear-gradient(135deg, rgba(99,102,241,0.08) 0%, rgba(139,92,246,0.04) 100%);
            --gradient-live: linear-gradient(135deg, #10b981 0%, #059669 100%);
            --gradient-bg: radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.08) 0%, transparent 50%),
                           radial-gradient(ellipse at 80% 20%, rgba(139,92,246,0.06) 0%, transparent 50%),
                           radial-gradient(ellipse at 50% 80%, rgba(34,211,238,0.04) 0%, transparent 50%);

            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.3);
            --shadow-glow: 0 0 20px rgba(99, 102, 241, 0.15);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;

            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--gradient-bg);
            z-index: -1;
            pointer-events: none;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--accent-indigo); border-radius: 3px; }

        /* ── Status Bar ── */
        #status-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px; height: 40px;
            background: rgba(10, 14, 26, 0.92);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-glass);
            font-size: 12px; color: var(--text-secondary);
            font-family: var(--font-mono);
        }
        .status-item { display: flex; align-items: center; gap: 6px; }
        .status-dot {
            width: 7px; height: 7px; border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }
        .status-dot.green { background: var(--accent-emerald); box-shadow: 0 0 6px var(--accent-emerald); }
        .status-dot.amber { background: var(--accent-amber); box-shadow: 0 0 6px var(--accent-amber); }
        .status-dot.red { background: var(--accent-rose); box-shadow: 0 0 6px var(--accent-rose); }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .status-offline-badge {
            background: rgba(244, 63, 94, 0.15);
            color: var(--accent-rose);
            padding: 2px 10px; border-radius: 10px;
            font-weight: 600; font-size: 11px;
            border: 1px solid rgba(244, 63, 94, 0.3);
        }

        /* ── Layout ── */
        .app-container {
            max-width: 1400px; margin: 0 auto;
            padding: 56px 24px 40px;
        }

        /* ── Header ── */
        .header {
            text-align: center; padding: 32px 0 24px;
        }
        .header h1 {
            font-size: 2.4rem; font-weight: 900;
            background: var(--gradient-primary);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em; line-height: 1.1;
        }
        .header p {
            color: var(--text-secondary); font-size: 0.95rem;
            margin-top: 8px; font-weight: 400;
        }
        .header .version-badge {
            display: inline-block; margin-top: 10px;
            padding: 3px 12px; border-radius: 20px;
            background: var(--gradient-card);
            border: 1px solid var(--border-glass);
            font-size: 11px; color: var(--accent-cyan);
            font-family: var(--font-mono); font-weight: 500;
        }

        /* ── Tab Navigation ── */
        .tab-nav {
            display: flex; gap: 4px; margin: 0 0 24px;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-md);
            padding: 4px;
            width: fit-content;
        }
        .tab-btn {
            background: transparent; border: none; color: var(--text-secondary);
            padding: 8px 20px; border-radius: var(--radius-sm);
            font-family: var(--font-main); font-size: 13px; font-weight: 500;
            cursor: pointer; transition: all 0.25s ease;
        }
        .tab-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.04); }
        .tab-btn.active {
            background: var(--accent-indigo); color: white;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.35);
        }

        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* ── Grid ── */
        .match-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 16px;
        }

        /* ── Match Card ── */
        .match-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden;
        }
        .match-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0;
            height: 2px;
            background: var(--gradient-primary);
            opacity: 0; transition: opacity 0.3s;
        }
        .match-card:hover {
            border-color: var(--border-glow);
            box-shadow: var(--shadow-glow);
            transform: translateY(-2px);
        }
        .match-card:hover::before { opacity: 1; }

        .match-card.live-card {
            border-color: rgba(16, 185, 129, 0.3);
        }
        .match-card.live-card::before {
            background: var(--gradient-live); opacity: 1;
            height: 3px;
        }

        .card-header {
            display: flex; justify-content: space-between;
            align-items: flex-start; margin-bottom: 16px;
        }
        .match-meta {
            display: flex; flex-direction: column; gap: 4px;
        }
        .match-label {
            font-size: 11px; font-weight: 600; text-transform: uppercase;
            color: var(--text-muted); letter-spacing: 0.08em;
        }
        .match-venue {
            font-size: 12px; color: var(--text-secondary);
        }
        .match-date {
            font-size: 11px; color: var(--text-muted);
            font-family: var(--font-mono);
        }

        .live-badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 3px 10px; border-radius: 20px;
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .live-badge.status-live {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-emerald);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .live-badge.status-live .badge-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--accent-emerald);
            animation: pulse-dot 1.5s infinite;
        }
        .live-badge.status-scheduled {
            background: rgba(99, 102, 241, 0.12);
            color: var(--accent-indigo);
            border: 1px solid rgba(99, 102, 241, 0.25);
        }
        .live-badge.status-completed {
            background: rgba(100, 116, 139, 0.12);
            color: var(--text-muted);
            border: 1px solid rgba(100, 116, 139, 0.2);
        }

        .teams-row {
            display: flex; align-items: center; justify-content: space-between;
            gap: 12px; margin-bottom: 14px;
        }
        .team-block {
            display: flex; flex-direction: column; align-items: center;
            gap: 6px; flex: 1; min-width: 0;
        }
        .team-logo {
            width: 52px; height: 52px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 800; color: white;
            border: 2px solid rgba(255,255,255,0.1);
            transition: transform 0.3s;
        }
        .match-card:hover .team-logo { transform: scale(1.08); }
        .team-name {
            font-size: 13px; font-weight: 600; text-align: center;
            color: var(--text-primary);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            max-width: 140px;
        }
        .versus {
            color: var(--text-muted); font-size: 12px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.15em;
            flex-shrink: 0;
        }

        .score-row {
            text-align: center; padding: 10px 0;
            border-top: 1px solid var(--border-glass);
        }
        .score-text {
            font-family: var(--font-mono); font-size: 1.4rem;
            font-weight: 700; color: var(--accent-cyan);
        }
        .over-text {
            font-size: 12px; color: var(--text-muted);
            font-family: var(--font-mono); margin-top: 2px;
        }

        /* ── Probability Bar ── */
        .prob-bar-wrapper {
            margin-top: 12px;
        }
        .prob-labels {
            display: flex; justify-content: space-between;
            font-size: 11px; font-weight: 600; margin-bottom: 5px;
        }
        .prob-track {
            height: 6px; border-radius: 3px;
            background: rgba(255, 255, 255, 0.06);
            overflow: hidden; position: relative;
        }
        .prob-fill {
            height: 100%; border-radius: 3px;
            background: var(--gradient-primary);
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ── Points Table ── */
        .points-table-wrap {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        .points-table {
            width: 100%; border-collapse: collapse;
        }
        .points-table th {
            background: rgba(99, 102, 241, 0.08);
            padding: 12px 16px; text-align: left;
            font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.08em;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-glass);
        }
        .points-table td {
            padding: 12px 16px; font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            color: var(--text-primary);
        }
        .points-table tr:hover td {
            background: rgba(99, 102, 241, 0.04);
        }
        .points-table .team-cell {
            display: flex; align-items: center; gap: 10px;
            font-weight: 600;
        }
        .points-table .team-dot {
            width: 8px; height: 8px; border-radius: 50%;
        }
        .points-table td.nrr-positive { color: var(--accent-emerald); }
        .points-table td.nrr-negative { color: var(--accent-rose); }

        /* ── Shimmer Skeleton ── */
        .skeleton-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 20px; min-height: 220px;
        }
        .shimmer {
            background: linear-gradient(90deg,
                rgba(255,255,255,0.03) 0%,
                rgba(255,255,255,0.08) 50%,
                rgba(255,255,255,0.03) 100%);
            background-size: 200% 100%;
            animation: shimmer 1.8s ease-in-out infinite;
            border-radius: var(--radius-sm);
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .shimmer-line {
            height: 14px; margin-bottom: 12px; border-radius: 4px;
        }
        .shimmer-line.w60 { width: 60%; }
        .shimmer-line.w80 { width: 80%; }
        .shimmer-line.w40 { width: 40%; }
        .shimmer-circle {
            width: 52px; height: 52px; border-radius: 50%;
            margin: 0 auto 8px;
        }

        /* ── Source Health Panel ── */
        .health-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 20px;
            backdrop-filter: blur(10px);
            margin-bottom: 24px;
        }
        .health-panel h3 {
            font-size: 14px; font-weight: 700;
            color: var(--text-primary); margin-bottom: 14px;
            display: flex; align-items: center; gap: 8px;
        }
        .health-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }
        .health-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-sm);
            font-size: 12px;
        }
        .health-item .h-dot {
            width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
        }
        .health-item .h-name { font-weight: 600; color: var(--text-primary); }
        .health-item .h-rate {
            margin-left: auto; font-family: var(--font-mono);
            font-size: 11px; color: var(--text-muted);
        }

        /* ── Empty State ── */
        .empty-state {
            text-align: center; padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state h3 { font-size: 18px; color: var(--text-secondary); margin-bottom: 8px; }
        .empty-state p { font-size: 14px; }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .app-container { padding: 52px 12px 24px; }
            .header h1 { font-size: 1.6rem; }
            .match-grid { grid-template-columns: 1fr; }
            #status-bar { padding: 0 12px; font-size: 10px; }
            .health-grid { grid-template-columns: 1fr 1fr; }
            .tab-nav { width: 100%; }
            .tab-btn { flex: 1; text-align: center; padding: 8px 12px; font-size: 12px; }
        }

        /* ── Utility ── */
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.4s ease; }
        /* ── Titan Pulse Button ── */
        .btn-titan {
            display: inline-flex; align-items: center; gap: 8px;
            width: 100%; justify-content: center;
            margin-top: 15px; padding: 10px;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-md);
            color: var(--accent-cyan);
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            text-decoration: none; transition: all 0.2s;
            font-family: var(--font-mono);
        }
        .btn-titan:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--accent-indigo);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
        }
        .pulse-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--accent-rose);
            box-shadow: 0 0 10px var(--accent-rose);
            animation: titan-pulse 1.5s infinite;
        }
        @keyframes titan-pulse {
            0% { transform: scale(0.9); opacity: 1; }
            70% { transform: scale(2); opacity: 0; }
            100% { transform: scale(0.9); opacity: 0; }
        }
    </style>
</head>

        {match_id:'ipl2026_9',teams:['Gujarat Titans','Rajasthan Royals'],team_short:['GT','RR'],venue:'Ahmedabad',date:'Apr 04, 2026',time_ist:'7:30 PM',status:'scheduled',score:'—',over:0,win_probability:0.5,source:'offline'},

        {match_id:'ipl2026_12',teams:['Kolkata Knight Riders','Punjab Kings'],team_short:['KKR','PBKS'],venue:'Kolkata',date:'Apr 06, 2026',time_ist:'7:30 PM',status:'scheduled',score:'—',over:0,win_probability:0.5,source:'offline'},
        {match_id:'ipl2026_13',teams:['Rajasthan Royals','Mumbai Indians'],team_short:['RR','MI'],venue:'Guwahati',date:'Apr 07, 2026',time_ist:'7:30 PM',status:'scheduled',score:'—',over:0,win_probability:0.5,source:'offline'},
        {match_id:'ipl2026_14',teams:['Delhi Capitals','Gujarat Titans'],team_short:['DC','GT'],venue:'Delhi',date:'Apr 08, 2026',time_ist:'7:30 PM',status:'scheduled',score:'—',over:0,win_probability:0.5,source:'offline'},
        {match_id:'ipl2026_15',teams:['Kolkata Knight Riders','Lucknow Super Giants'],team_short:['KKR','LSG'],venue:'Kolkata',date:'Apr 09, 2026',time_ist:'7:30 PM',status:'scheduled',score:'—',over:0,win_probability:0.5,source:'offline'},
    ];

    const OFFLINE_POINTS = [
        {name:'Chennai Super Kings',teamshortname:'CSK',matchesplayed:0,matcheswon:0,matcheslost:0,nr:0,points:0,nrr:'+0.000'},
        {name:'Delhi Capitals',teamshortname:'DC',matchesplayed:0,matcheswon:0,matcheslost:0,nr:0,points:0,nrr:'+0.000'},
        {name:'Gujarat Titans',teamshortname:'GT',matchesplayed:0,matcheswon:0,matcheslost:0,nr:0,points:0,nrr:'+0.000'},
        {name:'Kolkata Knight Riders',teamshortname:'KKR',matchesplayed:0,matcheswon:0,matcheslost:0,nr:0,points:0,nrr:'+0.000'},
        {name:'Lucknow Super Giants',teamshortname:'LSG',matchesplayed:0,matcheswon:0,matcheslost:0,nr:0,points:0,nrr:'+0.000'},
        {name:'Mumbai Indians',teamshortname:'MI',matchesplayed:0,matcheswon:0,matcheslost:0,nr:0,points:0,nrr:'+0.000'},
        {name:'Punjab Kings',teamshortname:'PBKS',matchesplayed:0,matcheswon:0,matcheslost:0,nr:0,points:0,nrr:'+0.000'},
        {name:'Rajasthan Royals',teamshortname:'RR',matchesplayed:0,matcheswon:0,matcheslost:0,nr:0,points:0,nrr:'+0.000'},
        {name:'Royal Challengers Bengaluru',teamshortname:'RCB',matchesplayed:0,matcheswon:0,matcheslost:0,nr:0,points:0,nrr:'+0.000'},
        {name:'Sunrisers Hyderabad',teamshortname:'SRH',matchesplayed:0,matcheswon:0,matcheslost:0,nr:0,points:0,nrr:'+0.000'},
    ];

    // ── State ───────────────────────────────────────────────────────────────
    let isOffline = false;
    let currentMatches = [];
    let currentHealth = null;
    let retryCount = 0;
    let lastFetchTime = 0;
    const MAX_RETRY_INTERVAL = 60000; // 60s max

    // ── API Base ────────────────────────────────────────────────────────────
    const API_BASE = window.location.origin;

    // ── Tabs ────────────────────────────────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
        });
    });

    // ── Team Helpers ────────────────────────────────────────────────────────
    function getShort(name) {
        return TEAM_SHORT[name] || name.substring(0, 3).toUpperCase();
    }
    function getColor(short) {
        return TEAM_COLORS[short] || '#6366f1';
    }

    // ── Fetch with Retry ────────────────────────────────────────────────────
    async function apiFetch(endpoint) {
        try {
            const resp = await fetch(`${API_BASE}${endpoint}`, { signal: AbortSignal.timeout(10000) });
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            retryCount = 0;
            return await resp.json();
        } catch (e) {
            retryCount++;
            throw e;
        }
    }

    // ── Render Match Card ───────────────────────────────────────────────────
    function renderMatchCard(match) {
        const teams = match.teams || ['TBD', 'TBD'];
        const t1 = teams[0] || 'TBD';
        const t2 = teams[1] || 'TBD';
        const s1 = (match.team_short && match.team_short[0]) || getShort(t1);
        const s2 = (match.team_short && match.team_short[1]) || getShort(t2);
        const c1 = getColor(s1);
        const c2 = getColor(s2);
        const status = match.status || 'scheduled';
        const score = match.score || '—';
        const over = match.over || 0;
        const prob = match.win_probability || 0.5;
        const venue = match.venue || 'TBD';
        const matchNum = match.match_num || '';
        const dateStr = match.date || '';
        const timeStr = match.time_ist || '';

        const isLive = status === 'live';
        const cardClass = isLive ? 'match-card live-card fade-in' : 'match-card fade-in';

        let statusBadge = '';
        if (status === 'live') {
            statusBadge = '<span class="live-badge status-live"><span class="badge-dot"></span>LIVE</span>';
        } else if (status === 'completed') {
            statusBadge = '<span class="live-badge status-completed">Completed</span>';
        } else {
            statusBadge = '<span class="live-badge status-scheduled">Upcoming</span>';
        }

        const probPct = Math.round(prob * 100);
        const probPct2 = 100 - probPct;

        let scoreSection = '';
        if (score && score !== '—' && score !== '0/0') {
            scoreSection = `
                <div class="score-row">
                    <div class="score-text">${score}</div>
                    ${over > 0 ? `<div class="over-text">${over} overs</div>` : ''}
                </div>`;
        } else if (dateStr) {
            scoreSection = `
                <div class="score-row">
                    <div class="score-text" style="font-size:1rem;color:var(--text-secondary)">${timeStr || '7:30 PM'} IST</div>
                    <div class="over-text">${dateStr}</div>
                </div>`;
        }

        return `
        <div class="${cardClass}" id="card-${match.match_id}">
            <div class="card-header">
                <div class="match-meta">
                    <span class="match-label">${matchNum ? 'Match ' + matchNum : 'IPL 2026'} • ${venue}</span>
                </div>
                ${statusBadge}
            </div>
            <div class="teams-row">
                <div class="team-block">
                    <div class="team-logo" style="background:${c1}">${s1}</div>
                    <div class="team-name">${t1}</div>
                </div>
                <span class="versus">VS</span>
                <div class="team-block">
                    <div class="team-logo" style="background:${c2}">${s2}</div>
                    <div class="team-name">${t2}</div>
                </div>
            </div>
            ${scoreSection}
            <div class="prob-bar-wrapper">
                <div class="prob-labels">
                    <span style="color:${c1}">${s1} ${probPct}%</span>
                    <span style="color:${c2}">${s2} ${probPct2}%</span>
                </div>
                <div class="prob-track">
                    <div class="prob-fill" style="width:${probPct}%;background:linear-gradient(90deg,${c1},${c2})"></div>
                </div>
            </div>
        </div>`;
    }

    // ── Render Matches Grid ─────────────────────────────────────────────────
    function renderMatches(matches) {
        const grid = document.getElementById('matches-grid');
        if (!matches || matches.length === 0) {
            grid.innerHTML = `
                <div class="empty-state" style="grid-column:1/-1">
                    <div class="icon">🏏</div>
                    <h3>No Matches Found</h3>
                    <p>Check back later for upcoming IPL 2026 matches.</p>
                </div>`;
            return;
        }

        // Sort: live first, then by match_num/date, completed last
        matches.sort((a, b) => {
            const order = { live: 0, scheduled: 1, completed: 2 };
            const sa = order[a.status] ?? 1;
            const sb = order[b.status] ?? 1;
            if (sa !== sb) return sa - sb;
            return (a.start_epoch || 0) - (b.start_epoch || 0);
        });

        // Show first 20 matches max to keep UI snappy
        const visible = matches.slice(0, 20);
        grid.innerHTML = visible.map(renderMatchCard).join('');
        currentMatches = matches;
    }

    // ── Render Points Table ─────────────────────────────────────────────────
    function renderPointsTable(points) {
        const tbody = document.getElementById('points-body');
        if (!points || points.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-muted)">No data available</td></tr>';
            return;
        }

        // Sort by points desc, then NRR
        points.sort((a, b) => {
            if (b.points !== a.points) return b.points - a.points;
            return parseFloat(b.nrr) - parseFloat(a.nrr);
        });

        tbody.innerHTML = points.map((team, i) => {
            const short = team.teamshortname || getShort(team.name);
            const color = getColor(short);
            const nrrVal = parseFloat(team.nrr || '0');
            const nrrClass = nrrVal > 0 ? 'nrr-positive' : nrrVal < 0 ? 'nrr-negative' : '';
            return `
                <tr>
                    <td style="font-weight:700;color:var(--text-muted)">${i + 1}</td>
                    <td>
                        <div class="team-cell">
                            <span class="team-dot" style="background:${color}"></span>
                            ${team.name || short}
                        </div>
                    </td>
                    <td>${team.matchesplayed || 0}</td>
                    <td style="color:var(--accent-emerald)">${team.matcheswon || 0}</td>
                    <td style="color:var(--accent-rose)">${team.matcheslost || 0}</td>
                    <td>${team.nr || 0}</td>
                    <td style="font-weight:700">${team.points || 0}</td>
                    <td class="${nrrClass}">${team.nrr || '+0.000'}</td>
                </tr>`;
        }).join('');
    }

    // ── Render Health Panel ──────────────────────────────────────────────────
    function renderHealth(health) {
        const grid = document.getElementById('health-grid');
        const sysGrid = document.getElementById('system-grid');
        if (!health || !health.sources) {
            grid.innerHTML = '<div class="health-item"><span class="h-name">No data</span></div>';
            return;
        }

        const sourceNames = {
            'espn': '🌐 ESPN API',
            'cricbuzz': '🏏 Cricbuzz API',
            'jina': '📖 Jina Reader',
            'html_scraper': '🔍 HTML Scraper',
            'static': '📋 Static Schedule'
        };

        grid.innerHTML = Object.entries(health.sources).map(([key, src]) => {
            const statusColor = src.status === 'healthy' ? 'var(--accent-emerald)' :
                                src.status === 'degraded' ? 'var(--accent-amber)' : 'var(--accent-rose)';
            return `
                <div class="health-item">
                    <span class="h-dot" style="background:${statusColor}"></span>
                    <span class="h-name">${sourceNames[key] || key}</span>
                    <span class="h-rate">${src.success_rate}%</span>
                </div>`;
        }).join('');

        sysGrid.innerHTML = `
            <div class="health-item">
                <span class="h-dot" style="background:${health.ml_engine_loaded ? 'var(--accent-emerald)' : 'var(--accent-rose)'}"></span>
                <span class="h-name">ML Engine</span>
                <span class="h-rate">${health.ml_engine_loaded ? 'Loaded' : 'Off'}</span>
            </div>
            <div class="health-item">
                <span class="h-dot" style="background:${health.redis_connected ? 'var(--accent-emerald)' : 'var(--accent-amber)'}"></span>
                <span class="h-name">Redis</span>
                <span class="h-rate">${health.redis_connected ? 'Connected' : 'Memory-only'}</span>
            </div>
            <div class="health-item">
                <span class="h-dot" style="background:var(--accent-emerald)"></span>
                <span class="h-name">Cache</span>
                <span class="h-rate">${health.cache_size || 0} entries</span>
            </div>
            <div class="health-item">
                <span class="h-dot" style="background:var(--accent-cyan)"></span>
                <span class="h-name">Last Source</span>
                <span class="h-rate">${health.last_source_used || '—'}</span>
            </div>`;
    }

    // ── Update Status Bar ───────────────────────────────────────────────────
    function updateStatusBar(online, activeCount, totalCount) {
        const dot = document.getElementById('status-dot');
        const text = document.getElementById('status-text');
        const sources = document.getElementById('source-count');
        const update = document.getElementById('last-update');
        const badge = document.getElementById('offline-badge');

        if (online) {
            dot.className = 'status-dot green';
            text.textContent = 'Connected';
            badge.classList.add('hidden');
        } else {
            dot.className = 'status-dot amber';
            text.textContent = 'Offline Mode';
            badge.classList.remove('hidden');
        }

        sources.textContent = `${activeCount}/${totalCount} Sources`;
        const now = new Date();
        update.textContent = `Updated: ${now.toLocaleTimeString()}`;
    }

    // ── Data Fetch Pipeline ─────────────────────────────────────────────────
    async function fetchAllData() {
        let matchesLoaded = false;
        let activeSources = 0;
        let totalSources = 5;

        // 1. Fetch matches
        try {
            const matches = await apiFetch('/matches');
            if (matches && matches.length > 0) {
                renderMatches(matches);
                matchesLoaded = true;
                isOffline = false;
                lastFetchTime = Date.now();
                // Cache in localStorage for offline
                try { localStorage.setItem('ipl_matches_cache', JSON.stringify(matches)); } catch(e) {}
            }
        } catch (e) {
            console.warn('Matches API failed:', e.message);
        }

        // 2. If API failed, try localStorage cache
        if (!matchesLoaded) {
            try {
                const cached = localStorage.getItem('ipl_matches_cache');
                if (cached) {
                    const parsed = JSON.parse(cached);
                    if (parsed.length > 0) {
                        renderMatches(parsed);
                        matchesLoaded = true;
                        console.info('Using localStorage cache');
                    }
                }
            } catch(e) {}
        }

        // 3. Ultimate fallback: hardcoded offline schedule
        if (!matchesLoaded) {
            isOffline = true;
            // DYNAMIC STATUS CALCULATION (BUG 8 FIX)
            const dynamicOffline = OFFLINE_SCHEDULE.map(m => {
                const copy = {...m};
                const dt = new Date(`${m.date} ${m.time_ist}`);
                if (!isNaN(dt.getTime())) {
                    const epoch = dt.getTime() / 1000;
                    copy.start_epoch = epoch;
                    const now = Date.now() / 1000;
                    if (now < epoch) copy.status = 'scheduled';
                    else if (now < epoch + 14400) copy.status = 'live'; // 4 hours
                    else copy.status = 'completed';
                }
                return copy;
            });
            renderMatches(dynamicOffline);
            matchesLoaded = true;
            console.info('Using offline fallback schedule with dynamic status');
        }

        // 4. Fetch health data
        try {
            const health = await apiFetch('/api/data-health');
            currentHealth = health;
            renderHealth(health);
            activeSources = health.active_sources || 0;
            totalSources = health.total_sources || 5;
        } catch (e) {
            activeSources = isOffline ? 1 : 3;
        }

        // 5. Fetch points table
        try {
            const pts = await apiFetch('/points/2026');
            if (pts && pts.points && pts.points.length > 0) {
                renderPointsTable(pts.points);
            } else {
                renderPointsTable(OFFLINE_POINTS);
            }
        } catch (e) {
            renderPointsTable(OFFLINE_POINTS);
        }

        updateStatusBar(!isOffline, activeSources, totalSources);
    }

    // ── Auto-Refresh Loop ───────────────────────────────────────────────────
    function getRefreshInterval() {
        // Adaptive: faster when live matches exist, slower otherwise
        const hasLive = currentMatches.some(m => m.status === 'live');
        if (hasLive) return 15000; // 15s for live
        if (retryCount > 3) return Math.min(MAX_RETRY_INTERVAL, 10000 * retryCount);
        return 30000; // 30s default
    }

    async function refreshLoop() {
        await fetchAllData();
        const interval = getRefreshInterval();
        setTimeout(refreshLoop, interval);
    }

    // ── Bootstrap ───────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
        refreshLoop();
    });
    </script>
